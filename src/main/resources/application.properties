spring.application.name=TicketManager

# Datasource ? values injected via environment variables (Render / docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/ticket_manager?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME: root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD: Rugya@51}

# Explicitly tell Hibernate to use MySQL dialect (required when no fallback URL exists)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

server.port=8080

# JWT secret
jwt.secret=${JWT_SECRET: ticketmanager-secret-key-ticketmanager}