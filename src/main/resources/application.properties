spring.application.name=TicketManager

# Datasource ? base URL injected via env var, query params hardcoded to avoid & parsing issues on Render
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ticket_manager}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Rugya@51}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

# JWT secret
jwt.secret=${JWT_SECRET:ticketmanager-secret-key-ticketmanager}